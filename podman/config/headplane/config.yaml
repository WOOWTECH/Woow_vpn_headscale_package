# Headplane v0.7.x — Podman config
# NOTE: do NOT add an `integration:` section — v0.7.0 validates
# integration.kubernetes.pod_name even when enabled=false.
server:
  host: "0.0.0.0"
  port: 3000
  cookie_secret_path: "/etc/headplane/cookie-secret"
  cookie_secure: false   # set true when serving over HTTPS

headscale:
  url: "http://headscale:8080"     # compose network alias
  api_key_path: "/etc/headplane/api-key"
