apiVersion: v1
kind: ConfigMap
metadata:
  name: headplane-config
  namespace: tenant-test
  labels:
    app: headplane
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 3000
      cookie_secret_path: "/etc/headplane/secrets/COOKIE_SECRET"
    headscale:
      url: "http://headscale.tenant-test.svc.cluster.local:8080"
      api_key_path: "/etc/headplane/api-key/api-key"
