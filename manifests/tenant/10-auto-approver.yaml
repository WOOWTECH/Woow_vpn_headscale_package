# NOTE: HeadscaleAutoApprover CRD 的 tag_owners 格式與 Headscale v0.29.x 的
# v2 policy parser 不相容（OwnerEnc 格式要求不同）。
#
# 替代方案：直接在 Headscale CR 的 acl_policy.inline 裡定義 autoApprovers。
# 見 02-headscale-cr.yaml 的 acl_policy.inline 區段。
#
# 以下為備用 — 當 operator 更新支援 v0.29 policy format 後可啟用：
#
# apiVersion: headscale.infrado.cloud/v1beta1
# kind: HeadscaleAutoApprover
# metadata:
#   name: server-routes
#   namespace: tenant-test
# spec:
#   headscaleRef: headscale
#   routes:
#     - cidr: "10.0.0.0/8"
#       tags:
#         - "tag:server"
#     - cidr: "192.168.0.0/16"
#       tags:
#         - "tag:server"
#   exitNodeTags:
#     - "tag:exit-node"
