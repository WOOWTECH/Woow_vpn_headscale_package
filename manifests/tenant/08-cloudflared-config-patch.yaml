# Cloudflare Tunnel ingress routes for Headplane admin UI.
#
# IMPORTANT: Cloudflare Tunnel CANNOT proxy the Headscale control plane
# (Tailscale noise protocol uses a non-standard HTTP Upgrade header that
# Cloudflare strips). Only use the tunnel for the Headplane web UI.
# See docs/DEPLOYMENT-REPORT.md for details and alternatives.
#
# NOTE: If your tunnel is remotely-managed (Cloudflare Zero Trust dashboard),
# update routes via the API instead:
#   PUT /accounts/{account_id}/cfd_tunnel/{tunnel_id}/configurations
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare
data:
  config.yaml: |
    tunnel: <YOUR_TUNNEL_ID>
    credentials-file: /etc/cloudflared/credentials.json
    no-autoupdate: true
    ingress:
      # Headplane admin UI — works fine through Cloudflare Tunnel
      - hostname: admin-<tenant>.example.com
        service: http://headplane.tenant-test.svc.cluster.local:3000
      # Headscale health/API endpoints work, but Tailscale clients CANNOT
      # register through Cloudflare (noise protocol incompatibility)
      - hostname: vpn-<tenant>.example.com
        service: http://headscale.tenant-test.svc.cluster.local:8080
      - service: http_status:404
